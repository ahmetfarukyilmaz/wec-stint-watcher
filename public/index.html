<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>STINT WATCHER · WEC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #07080a;
      --panel: #101216;
      --panel-2: #161a20;
      --line: #23262e;
      --line-soft: #1a1d23;
      --txt: #eef1f5;
      --dim: #767d8b;
      --dimmer: #4a505c;
      --signal: #c6ff2e;        /* timing yeşili */
      --purple: #b388ff;        /* fastest lap mor */
      --amber: #ffb327;
      --red: #ff3b46;
      --flag: var(--signal);    /* JS bayrak durumuna göre değiştirir */
      --on-flag: #07080a;       /* bayrak renkli yüzeyler üzerindeki metin (her iki temada koyu) */
      --grid: rgba(255,255,255,.022);
      --glow-a: rgba(198,255,46,.06);
      --glow-b: rgba(179,136,255,.05);
      --header-bg: rgba(7,8,10,.92);
      color-scheme: dark;
    }
    :root[data-theme="light"] {
      --bg: #eef0ea;
      --panel: #ffffff;
      --panel-2: #f6f7f3;
      --line: #d9ddd3;
      --line-soft: #e6e9e1;
      --txt: #14171c;
      --dim: #5f6670;
      --dimmer: #9aa0a8;
      --signal: #2f8f00;        /* koyu yeşil — beyaz üstünde okunur */
      --purple: #6d28d9;
      --amber: #b45309;
      --red: #d32030;
      --grid: rgba(0,0,0,.035);
      --glow-a: rgba(47,143,0,.07);
      --glow-b: rgba(109,40,217,.06);
      --header-bg: rgba(244,245,240,.9);
      color-scheme: light;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background:
        radial-gradient(1200px 600px at 85% -10%, var(--glow-a), transparent 60%),
        radial-gradient(900px 500px at 0% 110%, var(--glow-b), transparent 55%),
        linear-gradient(var(--grid) 1px, transparent 1px) 0 0 / 100% 34px,
        var(--bg);
      color: var(--txt);
      font-family: "Chakra Petch", system-ui, sans-serif;
      min-height: 100%;
      letter-spacing: .2px;
      -webkit-font-smoothing: antialiased;
      transition: background-color .25s ease, color .25s ease;
    }
    .mono { font-family: "JetBrains Mono", monospace; font-variant-numeric: tabular-nums; }

    /* ---------- TOP BAR ---------- */
    header {
      position: sticky; top: 0; z-index: 20;
      display: flex; align-items: center; gap: 18px;
      padding: 14px 26px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }
    header::before { /* flag accent rail */
      content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
      background: var(--flag); box-shadow: 0 0 18px var(--flag);
    }
    .brand { display: flex; align-items: baseline; gap: 12px; }
    .brand h1 { font-size: 21px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; }
    .brand h1 b { color: var(--flag); }
    .brand .sub { font-size: 11px; letter-spacing: 3px; color: var(--dim); text-transform: uppercase; }
    .spacer { flex: 1; }

    .flagpill {
      display: flex; align-items: center; gap: 9px;
      font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
      padding: 7px 14px; border: 1px solid var(--line); border-radius: 999px; background: var(--panel);
    }
    .flagpill .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--flag); box-shadow: 0 0 12px var(--flag); }
    .clock { display: flex; align-items: baseline; gap: 7px; padding: 6px 13px; border: 1px solid var(--line); border-radius: 999px; background: var(--panel); }
    .clock .lbl { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); }
    .clock .val { font-family: "JetBrains Mono", monospace; font-weight: 700; font-size: 14px; color: var(--txt); }
    /* lastik rozeti */
    .tire { display: inline-flex; align-items: center; gap: 5px; padding: 1px 7px; border-radius: 5px; border: 1px solid var(--line); margin-left: 6px; font-size: 11px; }
    .tire b { font-family: "JetBrains Mono", monospace; }
    .tire.fresh { border-color: var(--signal); color: var(--signal); }
    .tire.mid { color: var(--txt); }
    .tire.old { border-color: var(--amber); color: var(--amber); }
    .tire.worn { border-color: var(--red); color: var(--red); }

    .conn { display: flex; align-items: center; gap: 8px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); }
    #status { display: inline-flex; align-items: center; gap: 7px; padding: 6px 12px; border-radius: 999px; border: 1px solid var(--line); background: var(--panel); color: var(--dim); }
    #status::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--dimmer); }
    #status.ok { color: var(--signal); border-color: rgba(198,255,46,.3); }
    #status.ok::before { background: var(--signal); box-shadow: 0 0 10px var(--signal); animation: pulse 1.6s ease-in-out infinite; }
    #status.bad { color: var(--red); border-color: rgba(255,59,70,.35); }
    #status.bad::before { background: var(--red); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .25; } }

    button#enableNotif {
      font-family: inherit; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--on-flag); background: var(--flag); border: 0; padding: 9px 15px; border-radius: 8px;
      cursor: pointer; font-weight: 700; transition: transform .12s ease, box-shadow .2s ease;
    }
    button#enableNotif:hover { transform: translateY(-1px); box-shadow: 0 6px 22px -6px var(--flag); }

    button#themeToggle {
      font-family: inherit; font-size: 15px; line-height: 1; color: var(--dim);
      background: var(--panel); border: 1px solid var(--line); width: 38px; height: 36px;
      border-radius: 8px; cursor: pointer; transition: color .15s ease, border-color .15s ease, transform .12s ease;
    }
    button#themeToggle:hover { color: var(--txt); border-color: var(--dim); transform: translateY(-1px); }

    /* ---------- car ekleme kontrolü ---------- */
    .addcar { display: flex; gap: 6px; align-items: center; }
    .addcar input {
      font-family: inherit; font-size: 13px; color: var(--txt); background: var(--panel);
      border: 1px solid var(--line); border-radius: 8px; padding: 8px 11px; width: 130px; outline: none;
    }
    .addcar input:focus { border-color: var(--flag); }
    .addcar input::placeholder { color: var(--dimmer); }
    .addcar .add { font-family: inherit; font-size: 16px; font-weight: 700; line-height: 1; color: var(--on-flag); background: var(--flag); border: 0; width: 38px; height: 36px; border-radius: 8px; cursor: pointer; }
    .addcar .add:hover { transform: translateY(-1px); }

    #board[hidden], #standings[hidden], #globalfeed[hidden] { display: none !important; }

    /* ---------- genel / yarış kontrol feed'i ---------- */
    #globalfeed { max-width: 1500px; margin: 0 auto; padding: 16px 26px 0; }
    #globalfeed .gf-title { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--dim); margin-bottom: 10px; }
    .feed.gf { flex-direction: row; flex-wrap: wrap; max-height: none; gap: 8px; }
    .feed.gf .ev { flex: 1 1 320px; min-width: 280px; }
    .feed.gf .empty { padding: 6px 0; }

    /* ---------- sekmeler ---------- */
    .tabs { display: flex; gap: 8px; padding: 16px 26px 0; max-width: 1500px; margin: 0 auto; align-items: center; justify-content: space-between; }
    .tabset { display: flex; gap: 8px; }
    .smart { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--dim); }
    .smart .sl { letter-spacing: .5px; }
    .smart select, .smart input {
      font-family: inherit; font-size: 12px; color: var(--txt); background: var(--panel);
      border: 1px solid var(--line); border-radius: 7px; padding: 6px 9px; outline: none;
    }
    .smart input { width: 56px; text-align: center; }
    .smart select:focus, .smart input:focus { border-color: var(--flag); }
    .tabs button {
      font-family: inherit; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600;
      color: var(--dim); background: transparent; border: 0; border-bottom: 2px solid transparent;
      padding: 9px 4px; cursor: pointer; transition: color .15s, border-color .15s;
    }
    .tabs button:hover { color: var(--txt); }
    .tabs button.active { color: var(--flag); border-bottom-color: var(--flag); }

    /* ---------- sıralama tablosu ---------- */
    #standings { max-width: 1500px; margin: 0 auto; padding: 18px 26px 44px; }
    .stClass { margin: 18px 0 8px; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--dim); display: flex; align-items: center; gap: 10px; }
    .stClass::after { content: ""; flex: 1; height: 1px; background: var(--line); }
    table.standings { width: 100%; border-collapse: collapse; }
    table.standings td, table.standings th { padding: 9px 12px; text-align: left; border-bottom: 1px solid var(--line-soft); font-size: 13px; }
    table.standings th { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim); font-weight: 600; }
    table.standings td.pos, table.standings td.no, table.standings td.gap { font-family: "JetBrains Mono", monospace; font-weight: 700; }
    table.standings tr.tracked { background: color-mix(in srgb, var(--flag) 8%, transparent); }
    table.standings .autotag { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--bg); background: var(--flag); padding: 1px 5px; border-radius: 4px; margin-left: 6px; }
    table.standings .add {
      font-family: inherit; font-size: 15px; font-weight: 700; line-height: 1; width: 30px; height: 28px; border-radius: 6px;
      border: 1px solid var(--line); background: var(--panel); color: var(--dim); cursor: pointer; transition: all .12s;
    }
    table.standings .add:hover { color: var(--on-flag); background: var(--flag); border-color: var(--flag); }
    table.standings .add.on { color: var(--flag); border-color: var(--flag); }
    table.standings .add.on:hover { color: #fff; background: var(--red); border-color: var(--red); }

    /* ---------- LAYOUT: board = araç paneli satırı ---------- */
    main#board { display: flex; flex-wrap: wrap; gap: 22px; padding: 22px 26px 44px; max-width: 1500px; margin: 0 auto; align-items: flex-start; }
    .carpanel { flex: 1 1 430px; min-width: 340px; max-width: 680px; display: flex; flex-direction: column; gap: 16px; animation: rise .5s cubic-bezier(.2,.7,.2,1) both; }
    .feed-title { display: flex; align-items: center; gap: 10px; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--dim); }
    .feed-title::after { content: ""; flex: 1; height: 1px; background: var(--line); }
    .board-empty { width: 100%; text-align: center; color: var(--dimmer); padding: 60px 0; letter-spacing: 1px; }

    /* ---------- CAR CARD ---------- */
    .car {
      position: relative; overflow: hidden;
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      border: 1px solid var(--line); border-radius: 16px; padding: 22px 24px 24px;
      animation: rise .5s cubic-bezier(.2,.7,.2,1) both;
    }
    .car::after { content: ""; position: absolute; inset: 0; border-radius: 16px; pointer-events: none; box-shadow: inset 0 1px 0 rgba(255,255,255,.04); }
    @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

    .car-head { display: flex; align-items: center; gap: 18px; }
    .num {
      font-family: "JetBrains Mono", monospace; font-weight: 800; font-size: 34px; line-height: 1;
      color: var(--on-flag); background: var(--flag); padding: 12px 14px; border-radius: 12px;
      min-width: 78px; text-align: center; letter-spacing: -1px; box-shadow: 0 8px 30px -10px var(--flag);
    }
    .id { flex: 1; min-width: 0; }
    .id .driver { font-size: 22px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .id .meta { font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim); margin-top: 3px; }
    .id .meta .cls { color: var(--txt); }
    /* FIA sürücü kategorisi */
    .cat { display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: .5px; padding: 2px 6px; border-radius: 4px; vertical-align: middle; }
    .cat.p { background: #dbeafe; color: #0b2a52; }
    .cat.g { background: #f1c84b; color: #3a2c00; }
    .cat.s { background: #ccd1da; color: #1c1f26; }
    .cat.b { background: #cd7f4e; color: #2a1400; }
    .driver .cat { margin-left: 8px; }
    .lineup { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 9px; }
    .lineup .d { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--dim); border: 1px solid var(--line); border-radius: 6px; padding: 3px 7px; }
    .lineup .d.current { color: var(--txt); border-color: var(--flag); }

    .pin { position: absolute; top: 12px; right: 12px; z-index: 3; height: 28px; padding: 0 9px; border-radius: 7px; border: 1px solid var(--line); background: var(--panel); color: var(--dimmer); cursor: pointer; font-size: 12px; line-height: 1; transition: all .15s; opacity: .55; }
    .pin:hover { opacity: 1; color: var(--flag); border-color: var(--flag); }
    .pin.on { opacity: 1; color: var(--flag); border-color: var(--flag); background: color-mix(in srgb, var(--flag) 12%, var(--panel)); }
    .pin.on:hover { color: #fff; background: var(--red); border-color: var(--red); }
    .posbox { text-align: right; }
    .posbox .plabel { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); }
    .posbox .pval { font-family: "JetBrains Mono", monospace; font-weight: 800; font-size: 46px; line-height: .9; }
    .posbox .pval small { font-size: 18px; color: var(--dim); font-weight: 700; }
    .posbox .overall { font-size: 11px; color: var(--dimmer); letter-spacing: 1px; margin-top: 4px; }

    /* timing strip */
    .strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; margin-top: 22px; background: var(--line-soft); border: 1px solid var(--line-soft); border-radius: 12px; overflow: hidden; }
    .cell { background: var(--panel); padding: 13px 14px; }
    .cell .k { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); }
    .cell .v { font-family: "JetBrains Mono", monospace; font-weight: 700; font-size: 20px; margin-top: 5px; }
    .cell .v.purple { color: var(--purple); text-shadow: 0 0 16px rgba(179,136,255,.4); }
    .cell .v .delta { font-size: 12px; font-weight: 600; margin-left: 6px; }
    .delta.up { color: var(--red); }      /* yavaş */
    .delta.down { color: var(--signal); } /* hızlı */

    /* pit / stint satırı */
    .pitline { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-top: 12px; padding: 9px 12px; background: var(--panel); border: 1px solid var(--line); border-radius: 9px; font-size: 12px; color: var(--dim); }
    .pitline b { font-family: "JetBrains Mono", monospace; color: var(--txt); font-weight: 700; }
    .pitline .hl { color: var(--flag); }

    /* sektörler */
    .sectors { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 14px; }
    .sec { background: var(--panel); border: 1px solid var(--line); border-left: 3px solid var(--dimmer); border-radius: 8px; padding: 8px 10px; }
    .sec .sk { font-size: 10px; letter-spacing: 1.5px; color: var(--dim); text-transform: uppercase; }
    .sec .sv { font-family: "JetBrains Mono", monospace; font-weight: 700; font-size: 15px; margin-top: 3px; }
    .sec.purple { border-left-color: var(--purple); } .sec.purple .sv { color: var(--purple); }
    .sec.green  { border-left-color: var(--signal); } .sec.green .sv { color: var(--signal); }
    .sec.yellow { border-left-color: var(--amber); }
    .sec.gray   { border-left-color: var(--dimmer); }

    /* tur zamanı grafiği */
    .chart { margin-top: 18px; }
    .chart .cl { display: flex; justify-content: space-between; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); margin-bottom: 8px; }
    .chart svg { display: block; width: 100%; height: 96px; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; }
    .chart .line { fill: none; stroke: var(--flag); stroke-width: 2; vector-effect: non-scaling-stroke; }
    .chart .area { fill: var(--flag); opacity: .08; }
    .chart .best { stroke: var(--purple); stroke-width: 1; stroke-dasharray: 3 4; opacity: .6; vector-effect: non-scaling-stroke; }
    .chart .pit { fill: var(--amber); }
    .chart .dot { fill: var(--flag); }
    .chart svg circle[fill="transparent"] { cursor: crosshair; }

    /* son turlar — süre çipleri */
    .laps { display: flex; gap: 6px; overflow-x: auto; margin-top: 10px; padding-bottom: 4px; }
    .laps::-webkit-scrollbar { height: 5px; }
    .laps::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
    .lap { flex: 0 0 auto; min-width: 58px; background: var(--panel); border: 1px solid var(--line); border-top: 2px solid var(--dimmer); border-radius: 7px; padding: 6px 8px 7px; text-align: center; }
    .lap .ln { font-size: 9px; letter-spacing: 1px; color: var(--dim); }
    .lap .lt { font-family: "JetBrains Mono", monospace; font-size: 12px; font-weight: 700; margin-top: 2px; }
    .lap.purple { border-top-color: var(--purple); } .lap.purple .lt { color: var(--purple); }
    .lap.green  { border-top-color: var(--signal); }
    .lap.amber  { border-top-color: var(--amber); }
    .lap.red    { border-top-color: var(--red); }
    .lap.pit    { opacity: .5; }

    /* hava şeridi */
    .weatherbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; padding: 10px 26px; border-bottom: 1px solid var(--line-soft); background: color-mix(in srgb, var(--panel) 50%, transparent); }
    .wx { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; color: var(--dim); }
    .wx b { font-family: "JetBrains Mono", monospace; color: var(--txt); font-weight: 700; }
    .wx .sky { color: var(--txt); letter-spacing: .5px; }
    .wx.rain b, .wx.rain .sky { color: var(--amber); }

    /* battle gauge */
    .battle { margin-top: 20px; }
    .battle .bl { display: flex; justify-content: space-between; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); margin-bottom: 9px; }
    .gauge { position: relative; height: 50px; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; }
    .gauge .center { position: absolute; left: 50%; top: -4px; bottom: -4px; width: 2px; background: var(--flag); transform: translateX(-50%); box-shadow: 0 0 12px var(--flag); }
    .gauge .me { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); font-family: "JetBrains Mono", monospace; font-weight: 800; font-size: 13px; color: var(--on-flag); background: var(--flag); padding: 4px 7px; border-radius: 6px; z-index: 2; }
    .rival { position: absolute; top: 50%; transform: translate(-50%,-50%); display: flex; flex-direction: column; align-items: center; gap: 3px; transition: left .6s cubic-bezier(.2,.7,.2,1); }
    .rival .car-no { font-family: "JetBrains Mono", monospace; font-weight: 700; font-size: 12px; padding: 3px 6px; border-radius: 5px; background: var(--panel-2); border: 1px solid var(--line); }
    .rival .gap { font-size: 11px; letter-spacing: .5px; color: var(--dim); white-space: nowrap; }
    .rival.hot .car-no { color: var(--red); border-color: var(--red); box-shadow: 0 0 14px -2px var(--red); }
    .rival.hot .gap { color: var(--red); }
    .arrow { font-weight: 700; }
    .arrow.closing { color: var(--signal); }
    .arrow.losing { color: var(--dim); }

    /* ---------- EVENT FEED (araç başına) ---------- */
    .feed { list-style: none; display: flex; flex-direction: column; gap: 9px; max-height: 46vh; overflow-y: auto; padding-right: 4px; margin: 0; }
    .feed::-webkit-scrollbar { width: 6px; }
    .feed::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
    .ev {
      position: relative; display: flex; gap: 12px; align-items: flex-start;
      background: var(--panel); border: 1px solid var(--line-soft); border-left: 3px solid var(--accent, var(--dimmer));
      border-radius: 10px; padding: 11px 14px;
      animation: slidein .45s cubic-bezier(.2,.8,.2,1) both;
    }
    @keyframes slidein { from { opacity: 0; transform: translateX(-14px); } to { opacity: 1; transform: none; } }
    .ev .ico { font-family: "JetBrains Mono", monospace; font-weight: 800; font-size: 13px; color: var(--accent, var(--dim)); padding-top: 1px; min-width: 18px; text-align: center; }
    .ev .body { flex: 1; }
    .ev .body .txt { font-size: 14px; line-height: 1.35; }
    .ev .body .txt b { color: var(--accent, var(--txt)); }
    .ev .time { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--dimmer); white-space: nowrap; }
    .ev.flash { box-shadow: 0 0 0 1px var(--accent), 0 0 26px -6px var(--accent); }

    .empty { color: var(--dimmer); font-size: 13px; letter-spacing: 1px; padding: 20px 4px; text-align: center; }
    footer { text-align: center; color: var(--dimmer); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 10px 0 26px; }
  </style>
  <script>
    // Tema'yı paint öncesi uygula (FOUC yok). Varsayılan: dark.
    (function () {
      var q = new URLSearchParams(location.search).get("theme");
      var t = q || localStorage.getItem("sw-theme") || "dark";
      if (t === "light") document.documentElement.setAttribute("data-theme", "light");
    })();
  </script>
</head>
<body>
  <header>
    <div class="brand">
      <h1>STINT<b>·</b>WATCHER</h1>
      <span class="sub">FIA WEC LIVE</span>
    </div>
    <div class="spacer"></div>
    <form class="addcar" id="addForm" autocomplete="off">
      <input id="carInput" list="carList" placeholder="Araç no ekle" inputmode="numeric" />
      <datalist id="carList"></datalist>
      <button class="add" type="submit" title="Araç ekle">+</button>
    </form>
    <div class="clock" id="clock" style="display:none"><span class="lbl">Kalan</span><span class="val" id="clockVal">—</span></div>
    <div class="flagpill"><span class="dot"></span><span id="flagText">—</span></div>
    <div class="conn"><span id="status">bağlanıyor</span></div>
    <button id="themeToggle" title="Tema değiştir" aria-label="Tema değiştir">◐</button>
    <button id="enableNotif">Bildirimleri Aç</button>
  </header>

  <div class="weatherbar" id="weather"></div>

  <nav class="tabs">
    <div class="tabset">
      <button data-view="board" class="active">Paneller</button>
      <button data-view="standings">Sıralama</button>
    </div>
    <div class="smart">
      <span class="sl">📌 Akıllı takip</span>
      <select id="smartClass"><option value="">Kapalı</option></select>
      <span class="sl">ilk</span>
      <input id="smartN" type="number" min="0" max="30" value="0" title="Otomatik izlenecek araç sayısı" />
    </div>
  </nav>

  <section id="globalfeed">
    <div class="gf-title">⚑ Yarış Kontrol · Genel</div>
    <ul id="globalEvents" class="feed gf"><li class="empty">Genel olay yok</li></ul>
  </section>

  <main id="board"><div class="board-empty">Araç bekleniyor… Sağ üstten araç no ekle ya da Sıralama'dan + ile seç.</div></main>
  <section id="standings" hidden></section>

  <footer>insights.griiip.com · canlı poll</footer>

  <script src="app.js"></script>
</body>
</html>
